# The static linear-memory runtime for the `wasm-jit` simCodeTarget, compiled
# ONCE to `wasm32-unknown-unknown` and embedded into `openmodelica_codegen_wasm_jit`
# as `src/runtime.wasm` (regenerated by `build-runtime.sh`). Generated function /
# simulation-RHS modules import this module's `memory` and `rt_*` exports at JIT
# time, so the allocator, reference counting and string operations are shared,
# precompiled native code rather than something re-emitted into every module.
#
# Standalone `[workspace]` so the host workspace (which targets the native triple)
# never tries to build this wasm-only cdylib.
[package]
name = "openmodelica_codegen_wasm_jit_runtime"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
dlmalloc = { version = "0.2.14", features = ["global"] }
# Self-contained (in-wasm) `pow` for element-wise array power, so the JIT loop
# never crosses the wasm↔host boundary per element.
libm = "0.2"
# Dense linear algebra (LU/solve, and later the `Modelica.Math.Matrices.*`
# LAPACK externals) compiled into the in-wasm runtime. `no_std` + `alloc`
# (dlmalloc-backed) + `libm` for float ops — no host boundary crossing per solve.
nalgebra = { version = "0.35", default-features = false, features = ["alloc", "libm"] }

# In-wasm session driver (`src/session.rs`) for the no_std JIT runtime
# (wasm32-unknown-unknown): the shared driver + solver compiled in-wasm so the
# model's functionODE etc. are reached wasm->wasm. no_std (`default-features =
# false`); math routes through libm. mat_writer is not needed here (rows go into
# an rt_alloc buffer, not a `.mat`).
[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
openmodelica_sim_meta = { path = "../openmodelica_sim_meta", default-features = false }
daskr = { path = "../daskr", default-features = false }

# Standalone-export (wasm32-wasip1) only: the in-wasm driver (`src/standalone.rs`)
# decodes the model metadata, runs DASSL (daskr) / Euler, and serialises the
# `.mat`. wasip1 has std, so these keep their default (`std`) features.
[target.'cfg(target_os = "wasi")'.dependencies]
openmodelica_sim_meta = { path = "../openmodelica_sim_meta" }
openmodelica_mat_writer = { path = "../openmodelica_mat_writer" }
daskr = { path = "../daskr" }

[profile.release]
opt-level = "s"
lto = true
panic = "abort"
strip = true

[workspace]
