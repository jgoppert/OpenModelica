<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenModelica (wasm) — interactive</title>
<link rel="stylesheet" href="../theme.css" />
<style>
    body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  header b { color: var(--teal); }
  #log { flex: 1 1 auto; overflow-y: auto; padding: 12px; white-space: pre-wrap; word-break: break-word; }
  .cmd { color: #569cd6; }
  .cmd::before { content: ">>> "; color: #608b4e; }
  .reply { color: var(--fg); }
  .err { color: var(--err); }
  .meta { color: var(--muted); font-style: italic; }
  .plot { background: #fff; border-radius: 4px; padding: 8px; margin: 8px 0; max-width: 100%; overflow: auto; }
  .plot svg { display: block; max-width: 100%; height: auto; }
  header .hint { color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header code { color: #ce9178; }
  /* Compact, monospace buttons rather than theme.css's roomier default. */
  button { border-radius: 3px; padding: 5px 12px; font-size: inherit; }
  form { display: flex; flex: 0 0 auto; border-top: 1px solid var(--border); background: var(--panel); }
  #prompt { color: #608b4e; padding: 8px 4px 8px 12px; }
  #input { flex: 1; background: transparent; border: 0; border-radius: 0; color: var(--fg); font: inherit; padding: 8px 12px 8px 4px; outline: none; }
</style>
</head>
<body>
<header>
  <span class="title">OpenModelica</span>
  <span class="hint">interactive command (e.g. <code>checkModel(M)</code>); the Modelica library is installed on start, then try
    <code>simulate(Modelica.Electrical.Analog.Examples.ChuaCircuit, stopTime=100)</code>. stdout/stderr → devtools console.</span>
</header>
<div id="log"></div>
<form id="form" autocomplete="off">
  <span id="prompt">&gt;&gt;&gt;</span>
  <input id="input" name="input" placeholder="initialising…" disabled spellcheck="false" />
</form>

<script type="module">
import init, {
  omc_set_env, omc_init, omc_eval,
  omc_take_pending_downloads, omc_take_plot_commands, wasi_write_file,
} from '../omc/OpenModelicaCompiler.js';

const log = document.getElementById('log');
const input = document.getElementById('input');
const form = document.getElementById('form');

function line(text, cls) {
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// Fetch one pending file into the VFS, trying its mirrors in order. omc_eval is
// synchronous and cannot await a network fetch itself, so a command that needs a
// file (installPackage, updatePackageIndex, ...) aborts with the file recorded as
// "pending"; we fetch it here and re-run. A file no mirror serves is left absent,
// so the command's final run surfaces omc's own error.
async function fetchToVfs(urls, filename) {
  for (const url of urls) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) continue;
      wasi_write_file(filename, new Uint8Array(await resp.arrayBuffer()));
      return true;
    } catch (_) { /* try the next mirror */ }
  }
  return false;
}

// Run `src`, satisfy any downloads it requested, and run it again until it needs
// nothing new. `attempted` stops an undownloadable file from looping forever.
async function evalWithDownloads(src) {
  const attempted = new Set();
  for (;;) {
    const result = omc_eval(src);
    const pending = (omc_take_pending_downloads() || []).filter((p) => !attempted.has(p.filename));
    if (pending.length === 0) return result;
    omc_eval('getErrorString()');   // discard the aborted run's diagnostics
    omc_take_plot_commands();        // and any plots it recorded before aborting
    for (const item of pending) {
      attempted.add(item.filename);
      line('Downloading ' + (item.filename.split('/').pop() || item.filename) + '…', 'meta');
      await fetchToVfs(item.urls, item.filename);
    }
  }
}

(async () => {
  line('Loading wasm module…', 'meta');
  await init();                                   // fetch + instantiate the wasm
  omc_set_env('OPENMODELICAHOME', '/usr');         // builtins resolve by basename
  if (!omc_init()) {
    line('omc_init() failed — see the devtools console.', 'err');
    return;
  }
  // The browser omc ships no pre-installed library; install the MSL so the shell
  // is immediately usable (mirrors the worker-hosted terminals' init).
  line('Installing Modelica library…', 'meta');
  await evalWithDownloads('installPackage(Modelica)');
  const msg = omc_eval('getErrorString()').trim();
  if (msg && msg !== '""') line(msg, 'meta');
  line('Ready. ' + omc_eval('getVersion()'), 'meta');
  input.disabled = false;
  input.placeholder = '';
  input.focus();
})().catch((e) => line('Startup error: ' + e, 'err'));

form.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  line(cmd, 'cmd');
  if (cmd === 'quit()' || cmd === 'exit') { input.disabled = true; line('session closed', 'meta'); return; }
  input.disabled = true;
  let reply;
  try { reply = await evalWithDownloads(cmd); }
  catch (e) { line('' + e, 'err'); input.disabled = false; input.focus(); return; }
  line(reply, reply.startsWith('Error:') ? 'err' : 'reply');
  input.disabled = false;
  input.focus();
});
</script>
</body>
</html>
