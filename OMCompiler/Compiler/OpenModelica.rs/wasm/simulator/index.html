<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenModelica — Simulator</title>
<link rel="stylesheet" href="../theme.css" />
<style>

  main { flex:1 1 auto; display:grid; grid-template-columns:minmax(320px,40%) 1fr; min-height:0; }
  .left { display:flex; flex-direction:column; min-height:0; border-right:1px solid var(--border); overflow:hidden; }
  .right { display:flex; flex-direction:column; min-height:0; }
  /* Documentation column, shown only when the screen is wide enough (see below). */
  .docs { display:none; flex-direction:column; min-height:0; border-left:1px solid var(--border); }
  .docs-head { display:flex; align-items:center; gap:6px; padding-right:4px; flex:0 0 auto; }
  .docs-head .section-label { flex:1 1 auto; }
  .doc-toggle { background:transparent; border:0; color:var(--muted); cursor:pointer;
    padding:6px 8px; display:inline-flex; align-items:center; justify-content:center; }
  .doc-toggle:hover { color:var(--fg); }
  .doc-toggle svg { width:16px; height:16px; display:block; transition:transform .15s; }
  .doc-expand { display:none; }                 /* the collapsed-rail reopen button (desktop) */
  .doc-body { flex:1 1 auto; overflow-y:auto; padding:4px 14px 16px; font-size:13.5px; line-height:1.5; }
  .doc-body.empty { color:var(--muted); display:grid; place-items:center; text-align:center; }
  .doc-body img, .doc-body svg { max-width:100%; height:auto; }
  .doc-body a { color:var(--accent); }
  .doc-body table { border-collapse:collapse; max-width:100%; display:block; overflow-x:auto; }
  .doc-body td, .doc-body th { border:1px solid var(--border); padding:3px 6px; }
  .doc-body pre, .doc-body code { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; }
  .doc-body h1, .doc-body h2, .doc-body h3, .doc-body h4 { color:var(--fg); font-size:1.05em; margin:.8em 0 .3em; }
  .editor-label { display:flex; align-items:center; gap:10px; }
  .editor-label > span { flex:1 1 auto; }
  .ex-select { text-transform:none; letter-spacing:normal; width:auto; min-width:0; max-width:60%;
    background:#1b1b1b; color:var(--fg); border:1px solid var(--border); border-radius:4px;
    padding:3px 6px; font:inherit; font-size:12px; }
  textarea {
    flex:1 1 auto; resize:none; border:0; outline:none; min-height:120px;
    background:#1b1b1b; color:var(--fg); padding:10px 12px;
    font:14px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; tab-size:2;
  }
  /* log-scale tolerance stepper */
  .stepper { display:flex; align-items:stretch; gap:0; }
  .stepper input { text-align:center; border-radius:0; border-left:0; border-right:0; }
  .stepper button { background:#1b1b1b; border:1px solid var(--border); color:var(--fg);
    padding:0 9px; font-size:13px; border-radius:4px; }
  .stepper button:first-child { border-radius:4px 0 0 4px; }
  .stepper button:last-child { border-radius:0 4px 4px 0; }
  .stepper button:hover { background:#2d2d30; }

  /* Simulation-settings dialog (opened by the cogwheel). */
  .modal-backdrop { position:fixed; inset:0; z-index:50; display:grid; place-items:center;
    background:#0008; padding:16px; }
  .modal-backdrop[hidden] { display:none; }
  .modal { background:var(--panel); border:1px solid var(--border); border-radius:10px;
    width:min(460px,100%); box-shadow:0 14px 44px #000a; }
  .modal-head { display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid var(--border); font-weight:650; color:var(--fg); }
  .modal-body { padding:14px; display:grid; grid-template-columns:auto 1fr; gap:12px 14px; align-items:center; }
  .modal-body > label { color:var(--muted); }
  .modal-body select { background:#1b1b1b; color:var(--fg); border:1px solid var(--border);
    border-radius:4px; padding:3px 6px; font:inherit; }
  .modal-body select:disabled { opacity:.5; }
  .chk-group { display:flex; flex-direction:column; gap:6px; }
  .chk { display:flex; align-items:center; gap:7px; color:var(--fg); }
  .chk input { width:auto; }
  .modal-foot { display:flex; justify-content:flex-end; gap:8px;
    padding:12px 14px; border-top:1px solid var(--border); }
  .modal-hint { grid-column:1 / -1; color:var(--muted); font-size:12px; margin:0; }

  #icPanel { max-height:34%; overflow-y:auto; }
  /* Auto-fill into as many columns as fit (PID has many parameters to tune). */
  /* Enum: name dropdown, no unit column. */
  .ic-item.enum { grid-template-columns:minmax(0,1fr) minmax(0,1.4fr); }

  /* 3D animation view: sits above the charts (both visible). Canvas fills the
     pane, a control bar pinned below it, view presets overlaid top-right. */
  .anim { flex:0 0 46%; display:flex; flex-direction:column; min-height:200px;
    border-bottom:1px solid var(--border); }
  .anim[hidden] { display:none; }
  .anim-view { flex:1 1 auto; min-height:0; position:relative; background:#1e1e1e; overflow:hidden; }
  .anim-views { position:absolute; top:6px; right:8px; z-index:2; display:flex; gap:4px; }
  .anim-views button { background:#0009; border:1px solid var(--border); color:var(--fg);
    padding:3px 8px; font-size:12px; border-radius:4px; cursor:pointer; }
  .anim-views button:hover { background:#000c; border-color:var(--accent); }
  .anim-bar { flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:8px 12px;
    border-top:1px solid var(--border); background:var(--panel); }
  .anim-bar input[type=range] { flex:1 1 auto; width:auto; padding:0; accent-color:var(--accent); }
  .anim-bar .t { color:var(--muted); font:12.5px ui-monospace,Menlo,Consolas,monospace; min-width:5.5em; text-align:right; }
  .anim-bar select { width:auto; font-size:13px; padding:4px 6px; }
  .anim-speed-wrap { display:inline-flex; align-items:center; gap:2px; }
  .anim-bar input.anim-speed { width:5em; font-size:13px; padding:4px 6px; text-align:right; }
  .anim-speed-x { color:var(--muted); font-size:13px; }
  /* Play and repeat share one neutral scheme so they read as a matched pair. */
  .anim-play, .anim-loop { background:transparent; border:1px solid var(--border); color:var(--fg);
    border-radius:4px; height:30px; min-width:34px; padding:0 10px; font-size:14px; line-height:1;
    display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
  .anim-play:hover:not(:disabled), .anim-loop:hover { background:#2d2d30; border-color:var(--accent); color:var(--fg); }
  .anim-loop svg { width:16px; height:16px; display:block; }
  .anim-loop.active { color:var(--accent); border-color:var(--accent); }

  /* charts area: one card per plot, scrollable */
  /* Modelica units: superscript exponents and stacked (num-over-den) fractions */

  @media (max-width:820px), (orientation:portrait) {
    body { overflow:auto; height:auto; min-height:100vh; }
    main { grid-template-columns:1fr; }
    .left { border-right:0; border-bottom:1px solid var(--border); }
    /* Settings moved to the dialog, so the editor claims that height. */
    textarea { min-height:46vh; }
    .grid2 { grid-template-columns:auto 1fr; }
    #icPanel { max-height:none; }
    .charts { overflow:visible; }
    .anim { flex:none; height:auto; }
    .anim-view { height:70vw; min-height:320px; }
    header { flex-wrap:wrap; }
    header .status { order:3; flex-basis:100%; white-space:normal; }
    .ex-select { max-width:56%; }
    /* Documentation flows at the end of the page (scroll down to reach it). */
    .docs { display:block; border-left:0; border-top:1px solid var(--border); }
    .doc-body { overflow:visible; }
    .doc-body.empty { min-height:80px; }
    /* Collapsed: keep the header strip (with its reopen chevron), hide the body. */
    body.docs-hidden .doc-body { display:none; }
    body.docs-hidden .docs-head .doc-toggle svg { transform:rotate(180deg); }
  }

  /* Landscape screens: a third column for the model documentation. Always at
     least a thin rail with a reopen chevron, so it never vanishes entirely — it
     just starts collapsed on the narrower widths (see autoDocs). */
  @media (min-width:821px) and (orientation:landscape) {
    main { grid-template-columns:minmax(320px,30%) 1fr minmax(260px,22%); }
    .docs { display:flex; }
    /* Collapsed: the column becomes a thin rail with a reopen chevron. */
    body.docs-hidden main { grid-template-columns:minmax(320px,40%) 1fr 34px; }
    body.docs-hidden .docs-head, body.docs-hidden .doc-body { display:none; }
    body.docs-hidden .doc-expand { display:flex; flex:1 1 auto; align-items:flex-start;
      justify-content:center; width:100%; padding:10px 0; }
  }
</style>
<script type="importmap">
{ "imports": { "three": "./three.module.min.js" } }
</script>
</head>
<body>
<header>
  <span class="title">Simulator</span>
  <span class="status" id="status">Loading compiler…</span>
  <button id="viewToggle" class="ghost" style="display:none"></button>
  <button id="settingsBtn" class="ghost icon-only" title="Simulation settings" aria-label="Simulation settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <button id="exportFmu" class="ghost" disabled title="Export an FMI 3.0 wasm FMU of the active model">Export FMU</button>
  <button id="run" disabled>Run</button>
</header>

<main>
  <div class="left">
    <div class="section-label editor-label">
      <span>Modelica model</span>
      <select id="examples" class="ex-select" title="Load an example"></select>
    </div>
    <textarea id="src" spellcheck="false"></textarea>

    <div class="panel" id="icPanel">
      <div class="section-label">Initial conditions &amp; parameters</div>
      <div class="ic-grid" id="icGrid"></div>
      <div class="ic-empty" id="icEmpty">—</div>
    </div>
  </div>

  <div class="right">
    <div class="anim" id="anim" hidden>
      <div class="anim-view" id="animView">
        <div class="anim-views" id="animViews">
          <button data-view="iso" title="Isometric">Iso</button>
          <button data-view="side" title="Side (look −Z; x→ right, y↑ up)">Side</button>
          <button data-view="front" title="Front (look −X)">Front</button>
          <button data-view="top" title="Top (look −Y)">Top</button>
          <button data-view="fit" title="Reset view">Fit</button>
        </div>
      </div>
      <div class="anim-bar">
        <button class="anim-play" id="animPlay" title="Play/pause">▶</button>
        <button class="anim-loop" id="animLoop" title="Repeat" aria-label="Repeat" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
        <input type="range" id="animSeek" min="0" max="1000" value="0" step="1" aria-label="Time" />
        <span class="t" id="animTime">0.000 s</span>
        <span class="anim-speed-wrap" title="Playback speed: simulated seconds per real second (any positive number, e.g. 1e-9 or 1e6)">
          <input id="animSpeed" class="anim-speed" list="speedPresets" type="text" inputmode="decimal"
                 value="1" aria-label="Playback speed (simulated seconds per real second)" />
          <span class="anim-speed-x">×</span>
        </span>
        <datalist id="speedPresets">
          <option value="1e-9"></option><option value="1e-6"></option><option value="1e-3"></option>
          <option value="0.25"></option><option value="0.5"></option><option value="1"></option>
          <option value="2"></option><option value="4"></option><option value="10"></option>
          <option value="100"></option><option value="1e3"></option><option value="1e6"></option>
        </datalist>
      </div>
    </div>
    <div class="charts" id="charts"><div class="charts-empty" id="chartsEmpty">Run a model to see results.</div></div>
  </div>

  <div class="docs" id="docs">
    <div class="docs-head">
      <span class="section-label">Documentation</span>
      <button class="doc-toggle" id="docCollapse" title="Hide documentation" aria-label="Hide documentation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="doc-body empty" id="docBody">—</div>
    <button class="doc-toggle doc-expand" id="docExpand" title="Show documentation" aria-label="Show documentation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
  </div>
</main>

<div class="modal-backdrop" id="settingsBackdrop" hidden>
  <div class="modal" role="dialog" aria-label="Simulation settings" aria-modal="true">
    <div class="modal-head">
      <span>Simulation settings</span>
      <button class="icon-btn" id="settingsClose" title="Close" aria-label="Close">✕</button>
    </div>
    <div class="grid2">
      <label for="stop">Stop time</label>
      <input id="stop" type="number" step="any" />
      <label for="intervals">Intervals</label>
      <input id="intervals" type="number" step="1" min="1" />
      <label for="method">Solver</label>
      <select id="method"><option value="dassl">dassl</option><option value="euler">euler</option></select>
      <label for="tol">Tolerance</label>
      <div class="stepper">
        <button type="button" id="tolDn" title="÷10">▼</button>
        <input id="tol" type="text" inputmode="decimal" />
        <button type="button" id="tolUp" title="×10">▲</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="exportBackdrop" hidden>
  <div class="modal" role="dialog" aria-label="Export FMU" aria-modal="true">
    <div class="modal-head">
      <span>Export FMU</span>
      <button class="icon-btn" id="exportClose" title="Close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <label>Interfaces</label>
      <div class="chk-group">
        <label class="chk"><input type="checkbox" id="fmiMe" checked /> Model Exchange</label>
        <label class="chk"><input type="checkbox" id="fmiCs" checked /> Co-Simulation</label>
      </div>
      <label for="csSolver">CS solver</label>
      <select id="csSolver">
        <option value="dassl">dassl</option>
        <option value="euler">euler</option>
      </select>
      <p class="modal-hint">FMI 3.0 wasm component. Co-Simulation embeds the solver; Model Exchange leaves integration to the importer.</p>
    </div>
    <div class="modal-foot">
      <button class="ghost" id="exportCancel">Cancel</button>
      <button id="exportGo">Export</button>
    </div>
  </div>
</div>

<script type="module">
import { Animator } from './animation.js';
import { COLORS, createCharts, escapeHtml, unitHTML } from '../plot.js';
// The omc compiler runs in Web Workers (omc-worker.js), not on this thread, so
// compile/simulate never freezes the UI. Two are spawned: a plain one that is
// ready fast, and a second that installs the MSL in the background and takes
// over once ready (so library examples like PID_Controller can run).

// Selectable examples come from ./config.json (shipped alongside this page), so a
// host can curate their own set without touching the code. Each entry is either
// inline (`source` text, or `sourceFile` fetched lazily) run on any worker, or a
// `library` class inside the MSL (needs the MSL worker) with an optional `figures`
// annotation that curates the plotted variables. Populated by loadConfig().
let EXAMPLES = [];
// Minimal safety net if config.json is missing or invalid — the app still runs.
const FALLBACK_CONFIG = { title: 'Simulator', defaultExample: 'demo', examples: [
  { id: 'demo', label: 'Demo',
    source: 'model Demo\n  Real x(start = 1, fixed = true);\nequation\n  der(x) = -x;\nend Demo;\n' } ] };

// Categorical series palette, validated for the dark chart surface (#252526):
// eight distinct hues in a fixed, CVD-optimized order (dataviz reference palette).
// The always-present legend is the secondary encoding for the one adjacent pair
// that sits in the CVD floor band.

const el = (id) => document.getElementById(id);
const statusEl = el('status'), runBtn = el('run'), srcEl = el('src');
const chartsEl = el('charts'), chartsEmpty = el('chartsEmpty');
const charts = createCharts(chartsEl);
const icGrid = el('icGrid'), icEmpty = el('icEmpty'), tolEl = el('tol'), toggleBtn = el('viewToggle');
const exSel = el('examples'), docBody = el('docBody');
const settingsBtn = el('settingsBtn'), settingsBackdrop = el('settingsBackdrop'), settingsClose = el('settingsClose');
const animEl = el('anim'), animView = el('animView'), animPlay = el('animPlay'), animLoop = el('animLoop');
const animSeek = el('animSeek'), animTime = el('animTime'), animSpeed = el('animSpeed'), animViews = el('animViews');
let animLoopOn = false;   // repeat preference, persisted across runs

// Documentation collapse/expand, driven from inside the widget: a chevron in the
// doc header hides it; when collapsed it leaves a thin rail (desktop) or header
// strip (mobile) whose chevron reopens it. Collapsing widens the charts.
let docsUserToggled = false;   // once the user decides, stop auto-collapsing
function reflowDocs() {
  charts.redraw();                                   // chart width changed
  if (animator && !animEl.hidden) animator.resize();
}
function toggleDocs() {
  docsUserToggled = true;
  document.body.classList.toggle('docs-hidden');
  reflowDocs();
}
// Landscape screens narrower than the full 3-column layout start with the doc
// column collapsed to its rail (the chevron stays, so it's never lost) rather
// than vanishing. Wide screens start expanded; the user's choice overrides both.
function autoDocs() {
  if (docsUserToggled) return;
  const landscape = window.matchMedia('(orientation:landscape)').matches && window.innerWidth >= 821;
  const wantHidden = landscape && window.innerWidth < 1300;
  if (document.body.classList.contains('docs-hidden') === wantHidden) return;
  document.body.classList.toggle('docs-hidden', wantHidden);
  reflowDocs();
}
el('docCollapse').addEventListener('click', toggleDocs);
el('docExpand').addEventListener('click', toggleDocs);

let tolValue = 1e-6;
// Round to 6 significant figures so `1e-6 * 10` shows as `1e-5`, not `9.999…e-6`.
const cleanTol = (v) => Number(v.toPrecision(6));
function renderTol() { tolEl.value = cleanTol(tolValue).toExponential(); }
renderTol();

function setStatus(text, cls='') { statusEl.textContent = text; statusEl.className = 'status ' + cls; }
function num(v, d) { const n = parseFloat(v); return isFinite(n) ? n : d; }

// --- logging ---------------------------------------------------------------
const DEBUG = true;
const T0 = performance.now();
const tstamp = () => ((performance.now() - T0) / 1000).toFixed(2) + 's';
const log = (...a) => { if (DEBUG) console.log('[sim ' + tstamp() + ']', ...a); };
// Debug handle for the console: window.__sim.snap, .mode, .builtModel, etc.
if (DEBUG) window.__sim = {
  get snap() { return snap; }, get mode() { return mode; },
  get builtModel() { return builtModel; }, get figures() { return modelFigures; },
  get anim() { return animInfo; }, get animator() { return animator; },
  finalValue: (n) => { const c = snap && snap.cols && snap.cols[n]; return c ? c[c.length - 1] : null; },
};

// --- Worker RPC ------------------------------------------------------------
let nextId = 1;
let w1 = null, w2 = null;          // w1: plain, fast start. w2: MSL, ready later.
let primaryWorker = null;          // w1 until the MSL worker is promoted, then w2
let mslReady = null;               // resolves to w2 once its MSL is installed
let jobWorker = null;              // worker running the current foreground job
let statusFocus = null;            // also surface this worker's status (while awaiting MSL)

function attach(worker, tag) {
  worker._tag = tag; worker._pending = new Map();
  worker.onmessage = (ev) => {
    const d = ev.data;
    if (d.type === 'log') { log(tag + ':', d.text); return; }
    if (d.type === 'status') { if (worker === jobWorker || worker === statusFocus) setStatus(d.text, 'busy'); return; }
    const p = worker._pending.get(d.id); if (!p) return;
    worker._pending.delete(d.id);
    if (d.ok) p.resolve(d.result); else p.reject(new Error(d.error));
  };
  worker.onerror = (e) => {
    log(tag + ' onerror:', e.message || e);
    for (const [, p] of worker._pending) p.reject(new Error('worker error: ' + (e.message || e)));
    worker._pending.clear();
  };
}
function call(worker, cmd, args) {
  const id = nextId++;
  const t0 = performance.now();
  log('→', worker._tag, cmd, args && args.name ? args.name : '');
  return new Promise((resolve, reject) => {
    worker._pending.set(id, {
      resolve: (r) => { log('←', worker._tag, cmd, Math.round(performance.now() - t0) + 'ms'); resolve(r); },
      reject,
    });
    worker.postMessage({ id, cmd, ...(args || {}) });
  });
}
// `?driver=host|inwasm` overrides the simulation driver, for A/B'ing the two.
const DRIVER_MODE = { host: 0, inwasm: 1 }[new URLSearchParams(location.search).get('driver')] ?? null;

// Per-worker cancel control block (SharedArrayBuffer, needs the page's COOP/COEP
// headers): each worker gets its own so cancelling an export never disturbs another
// worker's job, e.g. the background MSL install. activeExportWorker is the target.
const canShareCancel = (typeof SharedArrayBuffer !== 'undefined');
let activeExportWorker = null;
function requestExportCancel() {
  const w = activeExportWorker;
  if (w && w._cancel) Atomics.store(w._cancel, 0, 1);
}

function makeWorker(tag) {
  const w = new Worker(new URL('./omc-worker.js', import.meta.url), { type: 'module' });
  attach(w, tag);
  if (canShareCancel) {
    w._cancel = new Int32Array(new SharedArrayBuffer(16));
    w.postMessage({ cmd: 'setCancelBuffer', buf: w._cancel.buffer });
  }
  if (DRIVER_MODE !== null) w.postMessage({ cmd: 'setDriver', mode: DRIVER_MODE });
  return w;
}
// The MSL worker took over: make it primary and terminate the plain worker so we
// keep a single wasm instance. A model built on w1 is dropped (rebuilt on demand).
function promote() {
  if (primaryWorker === w2) return;
  primaryWorker = w2;

// --- state ------------------------------------------------------------------
let icValues = new Map();     // param name -> input value (string)
let builtModel = null, lastText = null;
let running = false, pendingKind = null, runningKind = null;
let modelFigures = null;      // parsed figures for the current model, or null
let viewMode = 'auto';        // 'auto' (figures if present) | 'all'
let colMap = new Map();       // result-variable name -> { values:Float64Array, unit }
let snap = null;              // last simulation snapshot from a worker
let modelDoc = '';            // current model's documentation HTML (persists across re-sims)
let currentExample = null;
let mode = 'inline';          // 'inline' | 'librarycopy'
let builtWorker = null;       // worker that holds the current built model (for resim)
let mslDone = false;          // true once the MSL worker has finished install+load
let mslJobStarted = false;    // true once a real MSL job is requested → skip the throwaway warmup
let copyName = null;          // top-level name of the current library copy (copyClass), else null
let preloaded = null;         // a class already loaded by copyClass (skip the first redundant loadSource)

async function run(kind) {                       // 'full' | 'resim'

    // Cancel an in-flight resim so the latest values run now; a full build is left
    // alone (its compiled model is needed, and it can't yield mid-build).

    // used and seed the dialog. Once seeded (or user-overridden), pass the values.
    const settings = freshModel ? { method } : { method,
      stopTime: num(el('stop').value, 1),
      intervals: Math.max(1, Math.round(num(el('intervals').value, 500))),
      tolerance: tolValue };

    // Re-simulate the already-built model (fast, no recompile) when possible.
    if (kind === 'resim' && builtModel && builtWorker) {

      runMs = performance.now() - tRun;

      if (needsMsl(text) && !mslDone) setStatus('Loading Modelica library…', 'busy');
      const worker = await pickWorker(text);
      if (!worker) throw new Error('compiler not ready');
      jobWorker = worker;
      const name = parseModelName(text);
      let lm;
      if (preloaded && preloaded === name && !textChanged) {
        lm = { ok: true, name };            // copyClass already loaded it — skip the redundant loadString
      } else {

    renderCharts();

    const drv = DRIVER_MODE !== null ? ` (${DRIVER_MODE ? 'in-wasm' : 'host'} driver)` : '';

// --- examples ---------------------------------------------------------------
// Immediately blank the stale panels so a switch doesn't keep showing the old

  docBody.className = 'doc-body empty'; docBody.textContent = '…';

async function selectExample(ex) {

// Fetch a text asset shipped with the page (example .mo files, config).

// minimal built-in config so the page still works if it is missing.

  catch (e) { log('config.json load failed, using fallback', e); cfg = FALLBACK_CONFIG; }
  if (cfg.title) { document.title = 'OpenModelica — ' + cfg.title; const t = document.querySelector('header .title'); if (t) t.textContent = cfg.title; }
  EXAMPLES = Array.isArray(cfg.examples) && cfg.examples.length ? cfg.examples : FALLBACK_CONFIG.examples;
  exSel.replaceChildren();

function fail(msg) {

// --- editable initial conditions -------------------------------------------

  icEmpty.style.display = 'none';

    const nm = document.createElement('div'); nm.className = 'nm'; nm.textContent = p.name; nm.title = p.comment || p.name;
    item.appendChild(nm);

      const idx = Math.round(p.value) || 1;
      icValues.set(p.name, String(idx));
      const sel = document.createElement('select');
      p.enumNames.forEach((n, i) => { const o = document.createElement('option'); o.value = String(i + 1); o.textContent = n; sel.appendChild(o); });
      sel.value = String(idx);

// -override=name=value re-simulates the built model without recompiling; no

// Render the model's documentation HTML in the (wide-screen) doc column. The

  const html = (modelDoc || '').replace(/<script[\s\S]*?<\/script>/gi, '').trim();

// --- result column access ---------------------------------------------------

// --- chart rendering --------------------------------------------------------
function renderCharts() {
  charts.clear();
  buildColMap();
  const haveFigs = !!(modelFigures && modelFigures.length);
  toggleBtn.style.display = haveFigs ? '' : 'none';
  const useFigs = haveFigs && viewMode !== 'all';
  toggleBtn.textContent = useFigs ? 'All variables' : 'Figures';
  if (useFigs) renderFigures(); else renderAllVariables();
  if (!charts.list.length) { chartsEl.appendChild(chartsEmpty); chartsEmpty.style.display = '';
    chartsEmpty.textContent = 'No variables to plot.'; }
}

function renderAllVariables() {
  const series = (snap && snap.series) || [];
  const time = colMap.get('time');
  if (!time) return;
  const curves = [];
  series.forEach((m) => {
    if (m.constant || m.alias) return;
    const yc = colMap.get(m.name); if (!yc) return;
    const { xs, ys } = alignXY(time, yc);
    curves.push({ label: m.name, unit: m.unit || '', color: COLORS[curves.length % COLORS.length], xs, ys });
  });

function renderFigures() {
  modelFigures.forEach((fig, fi) => {
    const ftitle = expandText(fig.title);
    if (ftitle) { const h = document.createElement('div'); h.className = 'fig-head'; h.textContent = ftitle; chartsEl.appendChild(h); }
    (fig.plots || []).forEach((plot, pi) => {
      const curves = [];
      (plot.curves || []).forEach((cv) => {
        const yc = colMap.get(cv.y); if (!yc) return;
        const xname = cv.x && cv.x !== '' ? cv.x : 'time';

        xIsTime,

        xUnit: xAxis.unit || (xIsTime ? 's' : ''),

// Click a time-based chart to jump the animation (and the shared cursor) to that time.
chartsEl.addEventListener('click', (ev) => {
  if (!animator || !animInfo) return;
  const c = charts.at(ev.target);
  if (!c || !c.state || !c.spec.xIsTime || !c.state.active.length) return;
  const st = c.state, xs = st.active[0].xs;
  const vbX = (ev.clientX - c.svgEl.getBoundingClientRect().left) / c.svgEl.clientWidth * st.geom.W;
  let best = 0, bd = Infinity;
  for (let i = 0; i < xs.length; i++) { const d = Math.abs(st.px(xs[i]) - vbX); if (d < bd) { bd = d; best = i; } }

// --- 3D animation (shown alongside the charts) ------------------------------
// Ask the worker for the last run's MultiBody scene. Present only when the model
// produced a visxml scene with shapes; otherwise the 3D pane stays hidden and the
// charts take the whole column.
async function fetchAnim(worker) {
  animInfo = null;
  try {
    const r = await call(worker, 'anim');
    if (r && r.available) animInfo = { ...r };
  } catch (e) { log('anim fetch failed', e); }
  if (animInfo) { animEl.hidden = false; loadAnimator(); }

  animator.setData(animInfo.scene, animInfo.times, animInfo.data, animInfo.stride);
  animator.speed = readSpeed();
  animator.loop = animLoopOn;
  animPlay.textContent = '▶';
  requestAnimationFrame(() => animator.resize());   // size now that the pane is visible
  reflectAnimTime(animInfo.times && animInfo.times.length ? animInfo.times[0] : 0);

  return T && T.length ? [T[0], T[T.length - 1]] : [0, 1];
}
// Playback callback: keep the timeline UI in sync and draw the matching time
// marker on the (time-based) charts, so the plotted values line up with the pose.
function reflectAnimTime(t) {
  animTime.textContent = (+t).toFixed(3) + ' s';
  const [s, e] = animTimeRange();
  animSeek.value = String(e > s ? Math.round((t - s) / (e - s) * 1000) : 0);
  if (animator) animPlay.textContent = animator.playing ? '❚❚' : '▶';

// --- synchronized time cursor on the charts ---------------------------------
function nearestByX(xs, xv) { let b = 0, bd = Infinity; for (let i = 0; i < xs.length; i++) { const d = Math.abs(xs[i] - xv); if (d < bd) { bd = d; b = i; } } return b; }

// Place a chart's hover-style cursor (vertical line, dots, tooltip) at sample i0.
function placeCursor(chart, i0) {
  const st = chart.state; if (!st) return;
  const { active, px, py, geom, cursor, vline, dots } = st;
  const cx = px(active[0].xs[i0]);
  cursor.setAttribute('style', ''); vline.setAttribute('x1', cx); vline.setAttribute('x2', cx);
  let html = '';
  active.forEach((c, k) => {
    const i = c.xs === active[0].xs ? i0 : nearestByX(c.xs, active[0].xs[i0]);
    dots[k].setAttribute('cx', px(c.xs[i])); dots[k].setAttribute('cy', py(c.ys[i]));
    html += '<div class="row"><span class="sw" style="background:' + c.color + '"></span>'
      + escapeHtml(c.label) + ' = ' + (+c.ys[i].toPrecision(6)) + (c.unit ? ' ' + unitHTML(c.unit) : '') + '</div>';
  });

  chart.tip.innerHTML = '<div class="t">' + xLbl + ' = ' + (+active[0].xs[i0].toPrecision(6)) + '</div>' + html;
  chart.tip.style.display = 'block';
  const sw = chart.svgEl.clientWidth || geom.W, ww = chart.wrap.clientWidth || sw;

function setChartsCursor(t) {

animPlay.addEventListener('click', () => { if (animator) { animator.toggle(); animPlay.textContent = animator.playing ? '❚❚' : '▶'; } });
animLoop.addEventListener('click', () => {

animSeek.addEventListener('input', () => { if (!animator) return; const [s, e] = animTimeRange(); animator.pause(); animator.seek(s + (e - s) * (+animSeek.value / 1000)); animPlay.textContent = '▶'; });
// Playback speed = simulated seconds per real second; any positive value (1e-9
// for picosecond models, 1e6 for year-scale). Invalid input falls back to 1×.
function readSpeed() { const s = parseFloat(animSpeed.value); return (isFinite(s) && s > 0) ? s : 1; }
animSpeed.addEventListener('change', () => { const s = readSpeed(); animSpeed.value = String(s); if (animator) animator.speed = s; });
animViews.addEventListener('click', (e) => {
  const v = e.target && e.target.dataset && e.target.dataset.view; if (!v || !animator) return;
  if (v === 'fit') animator.fit(); else animator.setView(v);
});

// --- settings dialog --------------------------------------------------------
function openSettings() { settingsBackdrop.hidden = false; }
function closeSettings() { settingsBackdrop.hidden = true; }
settingsBtn.addEventListener('click', openSettings);
settingsClose.addEventListener('click', closeSettings);
settingsBackdrop.addEventListener('click', (e) => { if (e.target === settingsBackdrop) closeSettings(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !settingsBackdrop.hidden) closeSettings(); });

// --- wiring -----------------------------------------------------------------
let debounce;
srcEl.addEventListener('input', () => {   // manual edits are authoritative: re-read the model's settings
  preloaded = null; freshModel = true;
  clearTimeout(debounce); debounce = setTimeout(() => run('full'), 700);
});
for (const id of ['stop', 'intervals', 'method']) el(id).addEventListener('change', () => run('full'));
function stepTol(factor) { tolValue = cleanTol(Math.min(1e-1, Math.max(1e-15, tolValue * factor))); renderTol(); run('full'); }
el('tolUp').addEventListener('click', () => stepTol(10));
el('tolDn').addEventListener('click', () => stepTol(0.1));
tolEl.addEventListener('keydown', (e) => { if (e.key === 'ArrowUp') { e.preventDefault(); stepTol(10); } else if (e.key === 'ArrowDown') { e.preventDefault(); stepTol(0.1); } });
tolEl.addEventListener('change', () => { const v = parseFloat(tolEl.value); if (isFinite(v) && v > 0) { tolValue = cleanTol(v); } renderTol(); run('full'); });
runBtn.addEventListener('click', () => { if (running) cancelRun(); else run('full'); });

const exportBtn = el('exportFmu');
function downloadBlob(name, bytes) {
  const url = URL.createObjectURL(new Blob([bytes], { type: 'application/octet-stream' }));
  const a = document.createElement('a');
  a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}
let exporting = false;
async function exportFmu({ fmuType, method }) {
  if (running || exporting) return;
  const text = srcEl.value;
  if (touchesModelica(text)) return fail('Refusing to modify the Modelica library — rename the class or remove any "within Modelica" clause.');
  exporting = true;
  exportBtn.textContent = 'Cancel';         // the button cancels the running export
  setStatus('Exporting FMU…', 'busy');
  try {
    if (needsMsl(text) && !mslDone) setStatus('Loading Modelica library…', 'busy');
    const worker = await pickWorker(text);
    if (!worker) throw new Error('compiler not ready');
    activeExportWorker = worker;   // so a Cancel targets this worker's control block
    const name = parseModelName(text);
    const lm = await call(worker, 'loadSource', { text, name });
    if (!lm.ok) return fail(lm.error);
    const r = await call(worker, 'exportFmu', { name: lm.name, fmuType, method });
    if (r.cancelled) { setStatus('Export cancelled.'); return; }
    if (!r.ok) return fail(r.error);
    downloadBlob(r.filename, r.bytes);
    setStatus(`Exported ${r.filename} (${fmuType}) — ${r.bytes.length} bytes.`);
  } catch (e) { fail('' + e); }
  finally { exporting = false; activeExportWorker = null; exportBtn.textContent = 'Export FMU'; }
}

// FMU export dialog: pick interface(s) and (for CS) the embedded solver.
const exportBackdrop = el('exportBackdrop'), fmiMe = el('fmiMe'), fmiCs = el('fmiCs'), csSolver = el('csSolver');
function syncExportDialog() {
  csSolver.disabled = !fmiCs.checked;
  el('exportGo').disabled = !(fmiMe.checked || fmiCs.checked);
}
function openExport() { if (!exportBtn.disabled) { syncExportDialog(); exportBackdrop.hidden = false; } }
function closeExport() { exportBackdrop.hidden = true; }
fmiCs.addEventListener('change', syncExportDialog);
fmiMe.addEventListener('change', syncExportDialog);
// While exporting the button cancels; otherwise it opens the dialog.
exportBtn.addEventListener('click', () => { if (exporting) requestExportCancel(); else openExport(); });
el('exportClose').addEventListener('click', closeExport);
el('exportCancel').addEventListener('click', closeExport);
exportBackdrop.addEventListener('click', (e) => { if (e.target === exportBackdrop) closeExport(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !exportBackdrop.hidden) closeExport(); });
el('exportGo').addEventListener('click', () => {
  const fmuType = fmiMe.checked && fmiCs.checked ? 'me_cs' : (fmiCs.checked ? 'cs' : 'me');
  const method = fmiCs.checked ? csSolver.value : undefined;
  closeExport();
  exportFmu({ fmuType, method });
});
toggleBtn.addEventListener('click', () => { viewMode = (viewMode === 'all') ? 'auto' : 'all'; renderCharts();
  if (snap) setStatus(`${snap.info.model} — ${snap.info.rows} points, t ∈ [${snap.info.start}, ${snap.info.stop}]` + ((modelFigures && modelFigures.length && viewMode !== 'all') ? ' · figures' : '')); });
window.addEventListener('resize', () => { autoDocs(); charts.redraw(); });
autoDocs();

exSel.addEventListener('change', () => { const ex = EXAMPLES.find((e) => e.id === exSel.value); if (ex) selectExample(ex); });

(async () => {
  try {
    await loadConfig();                             // examples + title, before the first run

    if (DRIVER_MODE !== null) log('sim driver forced to', DRIVER_MODE ? 'in-wasm' : 'host', '(?driver=)');
    w1 = makeWorker('w1');
    w2 = makeWorker('w2-msl');
    primaryWorker = w1;

    // Bring the MSL worker up in the background; it takes over once ready. Once
    // loaded, if the user hasn't already asked for an MSL model, warm it with a
    // throwaway simulate so its first real run isn't cold (see mslJobStarted).
    mslReady = (async () => {
      await call(w2, 'init'); await call(w2, 'installMSL'); mslDone = true; promote();
      if (!mslJobStarted) call(w2, 'warmup').catch((e) => log('warmup failed', e));
      return w2;
    })();
    mslReady.catch((e) => log('MSL worker failed to initialise', e));

    const v = await call(w1, 'init');
    if (!v || !v.ok) return setStatus('omc_init() failed — see the devtools console.', 'err');
    runBtn.disabled = false;
    el('exportFmu').disabled = false;
    setStatus('Ready. ' + v.version);
    selectExample(currentExample);                  // run the configured default example
  } catch (e) { log('startup error', e); setStatus('Startup error: ' + e, 'err'); }
})();
</script>
</body>
</html>
